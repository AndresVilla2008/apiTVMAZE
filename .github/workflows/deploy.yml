name: Deploy Angular
on:
  push:
    branches: [ main ] # Revisa si tu rama se llama main o master
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install and Build
        run: |
          npm install
          npx ng build --base-href /${{ github.event.repository.name }}/

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/TU_PROYECTO/browser # CAMBIA "TU_PROYECTO" por el nombre de tu app
          branch: gh-pages
